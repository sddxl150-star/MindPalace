<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPalace - Ranking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow: hidden;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 4rem;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        .cards-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
            margin-bottom: 4rem;
            flex-wrap: wrap;
        }

        .card {
            width: 320px;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s ease-out forwards;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-left:hover {
            border-color: rgba(255, 107, 107, 0.6);
            box-shadow: 0 20px 40px rgba(255, 107, 107, 0.2);
        }

        .card-right:hover {
            border-color: rgba(0, 212, 255, 0.6);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border-radius: 20px;
            z-index: -1;
        }

        .card-left {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.15), rgba(255, 107, 107, 0.05));
            border: 1px solid rgba(255, 107, 107, 0.3);
            animation-delay: 0.5s;
        }

        .card-right {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(0, 212, 255, 0.05));
            border: 1px solid rgba(0, 212, 255, 0.3);
            animation-delay: 0.7s;
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
        }

        .card-left .card-icon {
            color: #ff6b6b;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.6);
        }

        .card-right .card-icon {
            color: #00d4ff;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
        }

        .card-left .card-title {
            color: #ff6b6b;
        }

        .card-right .card-title {
            color: #00d4ff;
        }

        .card-desc {
            font-size: 1rem;
            line-height: 1.8;
            color: #ccc;
        }

        .vs-divider {
            font-size: 1.5rem;
            font-weight: 700;
            color: #666;
            letter-spacing: 0.2em;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.9s forwards;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #888;
            letter-spacing: 0.1em;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.2s forwards;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 3rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .nav-link {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .nav-link.active {
            background: rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.4);
            color: #e94560;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            animation: float 20s infinite;
        }

        .particle:nth-child(3n) {
            background: rgba(255, 107, 107, 0.5);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.4);
        }

        .particle:nth-child(3n+1) {
            background: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }

        .particle:nth-child(3n+2) {
            background: rgba(254, 202, 87, 0.5);
            box-shadow: 0 0 10px rgba(254, 202, 87, 0.4);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                padding: 1.5rem;
                min-height: 100vh;
                height: auto;
            }

            .container {
                padding: 1rem 0.5rem;
            }

            .title {
                font-size: 1.8rem;
                letter-spacing: 0.2em;
                margin-bottom: 2.5rem;
            }

            .cards-wrapper {
                flex-direction: column;
                gap: 1.5rem;
                margin-bottom: 2.5rem;
            }

            .card {
                width: 100%;
                max-width: 320px;
                padding: 2rem 1.5rem;
            }

            .vs-divider {
                display: none;
            }

            .subtitle {
                font-size: 1rem;
                margin-top: 1.5rem;
            }

            .nav-links {
                flex-direction: column;
                gap: 0.5rem;
                margin-top: 2rem;
            }

            .nav-link {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1 class="title">RANKING</h1>
        
        <div class="cards-wrapper">
            <a href="https://openrouter.ai/rankings" target="_blank" class="card card-left">
                <div class="card-icon">📊</div>
                <h2 class="card-title">OpenRouter</h2>
                <p class="card-desc">全球500w开发者调用量排名<br>看实用热度</p>
            </a>
            
            <div class="vs-divider">VS</div>
            
            <a href="https://arena.ai/leaderboard" target="_blank" class="card card-right">
                <div class="card-icon">🏆</div>
                <h2 class="card-title">Arena</h2>
                <p class="card-desc">百万用户盲测投票<br>看真实体验好坏</p>
            </a>
        </div>
        
        <p class="subtitle">实用热度 vs 真实体验</p>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>

            <a href="companies.html" class="nav-link">公司</a>
            <a href="agentdev.html" class="nav-link">开发</a>
            <a href="projects.html" class="nav-link">项目</a>
            <a href="ranking.html" class="nav-link active">排名</a>
            <a href="community.html" class="nav-link">社区</a>
            <a href="dify-workflow.html" class="nav-link">本体构建 - Step 1 语义测试</a>
            <a href="ontology-ai.html" class="nav-link">本体+AI</a>
            <a href="fishtest.html" class="nav-link">FishTest</a>
            <a href="papers.html" class="nav-link">经典论文</a>
            <a href="openclaw.html" class="nav-link">Openclaw 探索</a>
            <a href="ocean-ranch.html" class="nav-link">AI+海洋牧场</a>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                particle.style.width = (Math.random() * 3 + 2) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        createParticles();
    </script>
</body>
</html>
