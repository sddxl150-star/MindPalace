<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPalace - Quote</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #0d0d0f 0%, #1a1a1f 50%, #0f0f12 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow: hidden;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .source {
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #888;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        .quote-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 3rem 4rem;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.6s forwards;
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .quote-english {
            font-size: 1.4rem;
            font-weight: 400;
            line-height: 1.8;
            color: #e8e8e8;
            font-style: italic;
            letter-spacing: 0.02em;
        }

        .quote-english::before {
            content: '"';
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.15);
            position: absolute;
            margin-left: -1.5rem;
            margin-top: -0.5rem;
            font-family: Georgia, serif;
        }

        .quote-chinese {
            font-size: 1.3rem;
            font-weight: 300;
            line-height: 1.8;
            color: #a0a0a0;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
            letter-spacing: 0.1em;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 3rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.3s forwards;
        }

        .nav-link {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .nav-link.active {
            background: rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.4);
            color: #e94560;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .quote-card {
                padding: 2rem 1.5rem;
            }
            
            .quote-english {
                font-size: 1.1rem;
            }
            
            .quote-chinese {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <p class="source">Simonides of Ceos，5th c. BC</p>
        
        <div class="quote-card">
            <p class="quote-english">Turn your mind into a palace. Nothing just disappears.</p>
        </div>
        
        <p class="quote-chinese">（化心为殿，万念不湮）</p>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>
            <a href="quote.html" class="nav-link active">引言</a>
            <a href="companies.html" class="nav-link">公司</a>
            <a href="agentdev.html" class="nav-link">开发</a>
            <a href="projects.html" class="nav-link">项目</a>
            <a href="ranking.html" class="nav-link">排名</a>
            <a href="community.html" class="nav-link">社区</a>
            <a href="dify-workflow.html" class="nav-link">本体构建 - Step 1 语义测试</a>
            <a href="ontology-ai.html" class="nav-link">本体+AI</a>
            <a href="fishtest.html" class="nav-link">FishTest</a>
            <a href="papers.html" class="nav-link">经典论文</a>
            <a href="openclaw.html" class="nav-link">Openclaw 探索</a>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 20;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                container.appendChild(particle);
            }
        }

        createParticles();
    </script>
</body>
</html>
