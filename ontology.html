<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本体论 (Ontology) - MindPalace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
            padding: 2rem;
        }

        .container {
            text-align: center;
            padding: 3rem;
            max-width: 800px;
        }

        .icon {
            font-size: 6rem;
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        .title {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #7b68ee, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #888;
            line-height: 1.8;
            margin-bottom: 2.5rem;
        }

        .coming-soon-badge {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: rgba(123, 104, 238, 0.15);
            border: 2px solid rgba(123, 104, 238, 0.4);
            border-radius: 30px;
            font-size: 1.1rem;
            color: #7b68ee;
            font-weight: 600;
            letter-spacing: 0.05em;
            animation: pulse 2s ease-in-out infinite;
        }

        .nav-links {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 3rem;
        }

        .nav-link {
            padding: 0.7rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            margin-top: 2.5rem;
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, rgba(123, 104, 238, 0.2), rgba(0, 212, 255, 0.2));
            border: 2px solid rgba(123, 104, 238, 0.4);
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.4s ease;
        }

        .back-link:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 30px rgba(123, 104, 238, 0.35);
            border-color: rgba(123, 104, 238, 0.6);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .container { padding: 2rem 1rem; }
            .title { font-size: 2rem; }
            .subtitle { font-size: 1.1rem; }
            .icon { font-size: 4rem; }
            .nav-links { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🧠</div>
        <h1 class="title">ONTOLOGY</h1>
        <p class="subtitle">
            本体论：Palantir 的核心技术哲学<br>
            探索数据建模、知识图谱与语义网络的深层逻辑
        </p>

        <div class="coming-soon-badge">
            🚧 内容建设中，敬请期待...
        </div>

        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>
            <a href="palantir.html" class="nav-link">Palantir</a>
            <a href="ai-basics.html" class="nav-link">AI 基础知识</a>
            <a href="skills.html" class="nav-link">Skills</a>
        </div>

        <a href="palantir.html" class="back-link">
            ← 返回 Palantir 页面
        </a>
    </div>
</body>
</html>
