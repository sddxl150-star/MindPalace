<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPalace - 离线页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow-y: auto;
            padding: 1rem;
        }

        .container {
            text-align: center;
            padding: 1rem;
            max-width: 100%;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        .error-title {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            color: #e94560;
        }

        .error-message {
            font-size: 1rem;
            color: #888;
            margin-bottom: 1rem;
            max-width: 600px;
            line-height: 1.6;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 250px;
            margin: 1rem auto;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, #4a4a4a 0%, #3a3a3a 100%);
            border-top: 2px solid #5a5a5a;
        }

        .dinosaur {
            position: absolute;
            bottom: 40px;
            left: 30px;
            font-size: 2.5rem;
            transition: bottom 0.1s ease-out;
            z-index: 10;
            transform: scaleX(-1);
        }

        .dinosaur.jumping {
            animation: jump 0.5s ease-out;
        }

        .dinosaur.running {
            animation: run 0.3s ease-in-out infinite;
        }

        @keyframes jump {
            0%, 100% {
                bottom: 40px;
            }
            50% {
                bottom: 180px;
            }
        }

        @keyframes run {
            0%, 100% {
                transform: scaleX(-1) translateY(0);
            }
            50% {
                transform: scaleX(-1) translateY(-3px);
            }
        }

        .obstacle {
            position: absolute;
            bottom: 40px;
            font-size: 1.8rem;
            animation: moveLeft 3s linear infinite;
        }

        @keyframes moveLeft {
            from {
                left: 100%;
            }
            to {
                left: -50px;
            }
        }

        .score {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.2rem;
            color: #feca57;
            font-weight: bold;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: #e94560;
            display: none;
            z-index: 20;
        }

        .instructions {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.5rem;
            font-style: italic;
        }

        .restart-btn {
            margin-top: 0.5rem;
            padding: 8px 20px;
            background: rgba(233, 69, 96, 0.2);
            border: 2px solid #e94560;
            border-radius: 25px;
            color: #e94560;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
        }

        .restart-btn:hover {
            background: rgba(233, 69, 96, 0.4);
            color: #fff;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 3rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .nav-link {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .nav-link.active {
            background: rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.4);
            color: #e94560;
        }

        /* 评论区域样式 */
        .comments-section {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .comments-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #e0e0e0;
        }

        .comments-subtitle {
            font-size: 1rem;
            color: #a0a0a0;
            margin-bottom: 2rem;
        }

        .comment-form {
            background: rgba(40, 40, 45, 0.85);
            border: 1px solid rgba(80, 80, 90, 0.4);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .comment-form input,
        .comment-form textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            background: rgba(50, 50, 55, 0.5);
            border: 1px solid rgba(80, 80, 90, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .comment-form input:focus,
        .comment-form textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
        }

        .comment-form textarea {
            resize: vertical;
            min-height: 120px;
        }

        .comment-form button {
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #00d4ff, #7b68ee);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .comment-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
        }

        .comments-list {
            background: rgba(40, 40, 45, 0.85);
            border: 1px solid rgba(80, 80, 90, 0.4);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .comments-list-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #e0e0e0;
        }

        .comment-item {
            padding: 1.5rem;
            background: rgba(50, 50, 55, 0.5);
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #00d4ff;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .comment-name {
            font-weight: 600;
            color: #e0e0e0;
        }

        .comment-date {
            font-size: 0.85rem;
            color: #a0a0a0;
        }

        .comment-content {
            color: #b0b0b0;
            line-height: 1.6;
        }

        .no-comments {
            color: #a0a0a0;
            text-align: center;
            padding: 2rem;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .game-container {
                width: 100%;
                max-width: 100%;
                height: 200px;
            }

            .dinosaur {
                font-size: 2rem;
                left: 20px;
                bottom: 35px;
            }

            .obstacle {
                font-size: 1.5rem;
                bottom: 35px;
            }

            .error-title {
                font-size: 1.5rem;
            }

            .error-message {
                font-size: 0.9rem;
            }

            .nav-links {
                flex-direction: column;
                gap: 0.3rem;
            }

            .nav-link {
                padding: 0.4rem 0.8rem;
                font-size: 0.75rem;
            }

            @keyframes jump {
                0%, 100% {
                    bottom: 35px;
                }
                50% {
                    bottom: 140px;
                }
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">🌐</div>
        <h1 class="error-title">无法连接到网络</h1>
        <p class="error-message">看起来您的网络连接已断开。请检查您的网络设置，然后刷新页面重试。</p>
        
        <div class="game-container" id="gameContainer">
            <div class="score">分数: <span id="score">0</span></div>
            <div class="dinosaur" id="dinosaur">🦖</div>
            <div class="ground"></div>
            <div class="game-over" id="gameOver">游戏结束！</div>
        </div>
        
        <p class="instructions">按空格可以开始游戏，按空格键让恐龙跳跃，躲避障碍物！</p>
        <button class="restart-btn" id="restartBtn" onclick="restartGame()">重新开始</button>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>

            <a href="companies.html" class="nav-link">公司</a>
            <a href="agentdev.html" class="nav-link">开发</a>
            <a href="projects.html" class="nav-link">项目</a>
            <a href="ranking.html" class="nav-link">排名</a>
            <a href="community.html" class="nav-link">社区</a>
            <a href="dify-workflow.html" class="nav-link">本体构建 - Step 1 语义测试</a>
            <a href="ontology-ai.html" class="nav-link">本体+AI</a>
            <a href="fishtest.html" class="nav-link">FishTest</a>
            <a href="papers.html" class="nav-link">经典论文</a>
            <a href="openclaw.html" class="nav-link">Openclaw 探索</a>
            <a href="ocean-ranch.html" class="nav-link">AI+海洋牧场</a>
            <a href="ocean-ranch-flow.html" class="nav-link">流程图</a>
        </div>

        <!-- 评论区域 -->
        <div class="comments-section">
            <h3 class="comments-title">💬 评论与反馈</h3>
            <p class="comments-subtitle">留下您的想法，我们会在审核后展示</p>
            
            <div class="comment-form">
                <input type="text" id="name" placeholder="您的姓名" required>
                <input type="email" id="email" placeholder="您的邮箱（仅用于审核）" required>
                <textarea id="comment" placeholder="请输入您的评论..." rows="4" required></textarea>
                <button onclick="submitComment()">提交评论</button>
            </div>
            
            <div class="comments-list">
                <h4 class="comments-list-title">💡 精选评论</h4>
                <div id="approvedComments"></div>
            </div>
        </div>
    </div>

    <script>
        const dinosaur = document.getElementById('dinosaur');
        const gameContainer = document.getElementById('gameContainer');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');
        const restartBtn = document.getElementById('restartBtn');
        
        let isJumping = false;
        let score = 0;
        let gameRunning = false;
        let obstacles = [];
        let gameInterval;
        let obstacleInterval;
        let gameStarted = false;

        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space') {
                event.preventDefault();
                if (!gameStarted) {
                    gameStarted = true;
                    gameRunning = true;
                    startGame();
                }
                jump();
            }
        });

        function jump() {
            if (!isJumping && gameRunning) {
                isJumping = true;
                dinosaur.classList.remove('running');
                dinosaur.classList.add('jumping');
                setTimeout(() => {
                    dinosaur.classList.remove('jumping');
                    isJumping = false;
                    if (gameRunning) {
                        dinosaur.classList.add('running');
                    }
                }, 500);
            }
        }

        function createObstacle() {
            if (!gameRunning) return;
            
            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            obstacle.innerHTML = '🌵';
            obstacle.style.animationDuration = (2 + Math.random() * 2) + 's';
            gameContainer.appendChild(obstacle);
            obstacles.push(obstacle);
            
            obstacle.addEventListener('animationend', () => {
                obstacle.remove();
                obstacles = obstacles.filter(obs => obs !== obstacle);
                score += 10;
                scoreElement.textContent = score;
            });
        }

        function checkCollision() {
            const dinoRect = dinosaur.getBoundingClientRect();
            
            for (let obstacle of obstacles) {
                const obsRect = obstacle.getBoundingClientRect();
                
                if (dinoRect.right > obsRect.left + 10 &&
                    dinoRect.left < obsRect.right - 10 &&
                    dinoRect.bottom > obsRect.top + 5) {
                    endGame();
                    return;
                }
            }
        }

        function endGame() {
            gameRunning = false;
            dinosaur.classList.remove('running');
            gameOverElement.style.display = 'block';
            restartBtn.style.display = 'block';
            
            obstacles.forEach(obstacle => {
                obstacle.style.animationPlayState = 'paused';
            });
            
            clearInterval(obstacleInterval);
            clearInterval(gameInterval);
        }

        function restartGame() {
            gameRunning = true;
            score = 0;
            scoreElement.textContent = score;
            gameOverElement.style.display = 'none';
            restartBtn.style.display = 'none';
            
            obstacles.forEach(obstacle => {
                obstacle.remove();
            });
            obstacles = [];
            
            dinosaur.classList.add('running');
            startGame();
        }

        function startGame() {
            if (gameRunning) {
                dinosaur.classList.add('running');
                obstacleInterval = setInterval(createObstacle, 2000);
                gameInterval = setInterval(checkCollision, 50);
            }
        }

        // 评论功能
        function submitComment() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const comment = document.getElementById('comment').value;
            
            if (!name || !email || !comment) {
                alert('请填写所有必填字段');
                return;
            }
            
            const newComment = {
                id: Date.now(),
                name: name,
                email: email,
                comment: comment,
                date: new Date().toISOString(),
                approved: false
            };
            
            // 存储到localStorage
            let comments = JSON.parse(localStorage.getItem('comments') || '[]');
            comments.push(newComment);
            localStorage.setItem('comments', JSON.stringify(comments));
            
            alert('评论已提交，等待审核后展示');
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('comment').value = '';
            
            // 显示已审核的评论
            displayApprovedComments();
        }
        
        function displayApprovedComments() {
            const commentsList = document.getElementById('approvedComments');
            const comments = JSON.parse(localStorage.getItem('comments') || '[]');
            const approvedComments = comments.filter(comment => comment.approved);
            
            if (approvedComments.length === 0) {
                commentsList.innerHTML = '<p class="no-comments">暂无评论，快来成为第一个评论者吧！</p>';
                return;
            }
            
            let html = '';
            approvedComments.forEach(comment => {
                const date = new Date(comment.date).toLocaleString('zh-CN');
                html += `
                    <div class="comment-item">
                        <div class="comment-header">
                            <span class="comment-name">${comment.name}</span>
                            <span class="comment-date">${date}</span>
                        </div>
                        <div class="comment-content">${comment.comment}</div>
                    </div>
                `;
            });
            
            commentsList.innerHTML = html;
        }
        
        // 显示已审核的评论
        displayApprovedComments();
    </script>
</body>
</html>
