<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPalace - 本体构建 - Step 1 语义测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-bottom: 3rem;
            background: linear-gradient(90deg, #00d4ff, #ff6b9d, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        .workflow-section {
            margin-bottom: 4rem;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s ease-out forwards;
        }

        .workflow-section:nth-child(2) {
            animation-delay: 0.6s;
        }

        .workflow-section:nth-child(3) {
            animation-delay: 0.9s;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: #feca57;
        }

        .workflow-image {
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 1rem;
        }

        .workflow-description {
            font-size: 1rem;
            color: #888;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
        }

        .code-block {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1.5rem;
            text-align: left;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            line-height: 1.4;
            overflow-x: auto;
            margin-bottom: 1rem;
        }

        .code-block pre {
            margin: 0;
            color: #00d4ff;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 3rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.2s forwards;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .nav-link.active {
            background: rgba(254, 202, 87, 0.2);
            border-color: rgba(254, 202, 87, 0.4);
            color: #feca57;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            animation: float 20s infinite;
        }

        .particle:nth-child(3n) {
            background: rgba(255, 107, 107, 0.5);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.4);
        }

        .particle:nth-child(3n+1) {
            background: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }

        .particle:nth-child(3n+2) {
            background: rgba(254, 202, 87, 0.5);
            box-shadow: 0 0 10px rgba(254, 202, 87, 0.4);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 1.5rem;
                min-height: 100vh;
                height: auto;
            }

            .container {
                padding: 1rem 0.5rem;
            }

            .title {
                font-size: 2rem;
                letter-spacing: 0.1em;
                margin-bottom: 2rem;
            }

            .workflow-section {
                margin-bottom: 2.5rem;
            }

            .section-title {
                font-size: 1.2rem;
                margin-bottom: 1rem;
            }

            .code-block {
                padding: 1rem;
                font-size: 0.8rem;
            }

            .workflow-description {
                font-size: 0.9rem;
            }

            .nav-links {
                flex-direction: column;
                gap: 0.5rem;
                margin-top: 2rem;
            }

            .nav-link {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1 class="title">本体构建 - Step 1 语义测试</h1>
        
        <div class="workflow-section">
            <h2 class="section-title">1. 使用 Vibe Coding 编写 Dify 工作流 yml 文件</h2>
            <img src="images/dify-yml-editor.jpg" alt="使用Vibe Coding编写Dify工作流yml文件" class="workflow-image">
            <p class="workflow-description">使用 Vibe Coding 方式在 Dify 平台中编写和配置工作流 yml 文件，展示工作流的可视化编排界面。</p>
        </div>
        
        <div class="workflow-section">
            <h2 class="section-title">2. IDE 工具中的 Dify 工作流代码界面</h2>
            <img src="images/dify-workflow.png" alt="IDE工具中的Dify工作流代码界面" class="workflow-image">
            <p class="workflow-description">在 IDE 工具中打开的 Dify 工作流代码界面，展示了工作流的配置结构和执行逻辑。</p>
        </div>
        
        <div class="workflow-section">
            <h2 class="section-title">3. 上传素材，记录结果</h2>
            <img src="images/20260312-011613CS.jpg" alt="上传素材，记录结果" class="workflow-image">
            <p class="workflow-description">上传素材文件并记录工作流执行结果，展示完整的测试和验证过程。</p>
        </div>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>
            <a href="quote.html" class="nav-link">引言</a>
            <a href="companies.html" class="nav-link">公司</a>

            <a href="projects.html" class="nav-link">项目</a>
            <a href="ranking.html" class="nav-link">排名</a>
            <a href="community.html" class="nav-link">社区</a>
            <a href="dify-workflow.html" class="nav-link active">本体构建 - Step 1 语义测试</a>
            <a href="ontology-ai.html" class="nav-link">本体+AI</a>
            <a href="fishtest.html" class="nav-link">FishTest</a>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                particle.style.width = (Math.random() * 3 + 2) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        createParticles();
    </script>
</body>
</html>
