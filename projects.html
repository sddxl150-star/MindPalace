<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPalace - Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .title {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #ff6b9d, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        .projects-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 2.5rem;
        }

        .project-item {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s ease-out forwards;
            text-decoration: none;
            display: block;
            padding: 0.8rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .project-item:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* 项目颜色 */
        .project-item:nth-child(1) {
            color: #feca57;
            text-shadow: 0 0 20px rgba(254, 202, 87, 0.5);
            animation-delay: 0.5s;
        }

        .project-item:nth-child(2) {
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            animation-delay: 0.7s;
        }

        .project-item:nth-child(3) {
            color: #ff6b9d;
            text-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
            animation-delay: 0.9s;
        }

        .project-item:nth-child(4) {
            color: #4ade80;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
            animation-delay: 1.1s;
        }

        .project-item:nth-child(4) .small-text {
            font-size: 0.7em;
            opacity: 0.6;
            margin-top: 0.5em;
            display: block;
        }

        .project-item:nth-child(5) {
            color: #a78bfa;
            text-shadow: 0 0 20px rgba(167, 139, 250, 0.5);
            animation-delay: 1.3s;
        }

        .project-item:nth-child(5) .small-text {
            font-size: 0.7em;
            opacity: 0.6;
            margin-top: 0.5em;
            display: block;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .nav-link {
            padding: 0.6rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .nav-link.active {
            background: rgba(254, 202, 87, 0.2);
            border-color: rgba(254, 202, 87, 0.4);
            color: #feca57;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            animation: float 20s infinite;
        }

        .particle:nth-child(3n) {
            background: rgba(255, 107, 157, 0.5);
            box-shadow: 0 0 10px rgba(255, 107, 157, 0.4);
        }

        .particle:nth-child(3n+1) {
            background: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }

        .particle:nth-child(3n+2) {
            background: rgba(254, 202, 87, 0.5);
            box-shadow: 0 0 10px rgba(254, 202, 87, 0.4);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                padding: 2rem 1rem;
                min-height: 100vh;
                height: auto;
            }

            .container {
                padding: 1rem 0.5rem;
                width: 100%;
                max-width: 100%;
            }

            .title {
                font-size: 2rem;
                letter-spacing: 0.2em;
                margin-bottom: 3rem;
            }

            .projects-grid {
                gap: 1.5rem;
                margin-bottom: 3rem;
            }

            .project-item {
                font-size: 1.4rem;
                padding: 0.8rem;
            }

            .nav-links {
                flex-direction: column;
                gap: 0.5rem;
            }

            .nav-link {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1 class="title">PROJECTS</h1>
        
        <div class="projects-grid">

            <a href="dify-workflow.html" target="_blank" class="project-item">
                本体构建 - 语义测试
                <div class="small-text">vibe coding写dify工作流</div>
            </a>
        </div>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>
            <a href="quote.html" class="nav-link">引言</a>
            <a href="companies.html" class="nav-link">公司</a>

        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                particle.style.width = (Math.random() * 3 + 2) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        createParticles();
    </script>
</body>
</html>
