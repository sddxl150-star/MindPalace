<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPalace - Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .title {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #ff6b9d, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        .projects-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 2.5rem;
        }

        .project-item {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s ease-out forwards;
            text-decoration: none;
            display: block;
            padding: 0.8rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .project-item:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* 项目颜色 */
        .project-item:nth-child(1) {
            color: #feca57;
            text-shadow: 0 0 20px rgba(254, 202, 87, 0.5);
            animation-delay: 0.5s;
        }

        .project-item:nth-child(2) {
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            animation-delay: 0.7s;
        }

        .project-item:nth-child(3) {
            color: #ff6b9d;
            text-shadow: 0 0 20px rgba(255, 107, 157, 0.5);
            animation-delay: 0.9s;
        }

        .project-item:nth-child(4) {
            color: #4ade80;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
            animation-delay: 1.1s;
        }

        .project-item:nth-child(4) .small-text {
            font-size: 0.7em;
            opacity: 0.6;
            margin-top: 0.5em;
            display: block;
        }

        .project-item:nth-child(5) {
            color: #a78bfa;
            text-shadow: 0 0 20px rgba(167, 139, 250, 0.5);
            animation-delay: 1.3s;
        }

        .project-item:nth-child(5) .small-text {
            font-size: 0.7em;
            opacity: 0.6;
            margin-top: 0.5em;
            display: block;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 3rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .nav-link {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .nav-link.active {
            background: rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.4);
            color: #e94560;
        }

        /* 评论区域样式 */
        .comments-section {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .comments-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #e0e0e0;
        }

        .comments-subtitle {
            font-size: 1rem;
            color: #a0a0a0;
            margin-bottom: 2rem;
        }

        .comment-form {
            background: rgba(40, 40, 45, 0.85);
            border: 1px solid rgba(80, 80, 90, 0.4);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .comment-form input,
        .comment-form textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            background: rgba(50, 50, 55, 0.5);
            border: 1px solid rgba(80, 80, 90, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .comment-form input:focus,
        .comment-form textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
        }

        .comment-form textarea {
            resize: vertical;
            min-height: 120px;
        }

        .comment-form button {
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #00d4ff, #7b68ee);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .comment-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
        }

        .comments-list {
            background: rgba(40, 40, 45, 0.85);
            border: 1px solid rgba(80, 80, 90, 0.4);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .comments-list-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #e0e0e0;
        }

        .comment-item {
            padding: 1.5rem;
            background: rgba(50, 50, 55, 0.5);
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #00d4ff;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .comment-name {
            font-weight: 600;
            color: #e0e0e0;
        }

        .comment-date {
            font-size: 0.85rem;
            color: #a0a0a0;
        }

        .comment-content {
            color: #b0b0b0;
            line-height: 1.6;
        }

        .no-comments {
            color: #a0a0a0;
            text-align: center;
            padding: 2rem;
            font-style: italic;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            animation: float 20s infinite;
        }

        .particle:nth-child(3n) {
            background: rgba(255, 107, 157, 0.5);
            box-shadow: 0 0 10px rgba(255, 107, 157, 0.4);
        }

        .particle:nth-child(3n+1) {
            background: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }

        .particle:nth-child(3n+2) {
            background: rgba(254, 202, 87, 0.5);
            box-shadow: 0 0 10px rgba(254, 202, 87, 0.4);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                padding: 2rem 1rem;
                min-height: 100vh;
                height: auto;
            }

            .container {
                padding: 1rem 0.5rem;
                width: 100%;
                max-width: 100%;
            }

            .title {
                font-size: 2rem;
                letter-spacing: 0.2em;
                margin-bottom: 3rem;
            }

            .projects-grid {
                gap: 1.5rem;
                margin-bottom: 3rem;
            }

            .project-item {
                font-size: 1.4rem;
                padding: 0.8rem;
            }

            .nav-links {
                flex-direction: column;
                gap: 0.5rem;
            }

            .nav-link {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1 class="title">PROJECTS</h1>
        
        <div class="projects-grid">
            <a href="https://sddxl150-star.github.io/Ivy/Resume.html" target="_blank" class="project-item">

            <a href="dify-workflow.html" target="_blank" class="project-item">
                本体构建 - 语义测试

            </a>
        </div>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>

            <a href="companies.html" class="nav-link">公司</a>

        <!-- 评论区域 -->
        <div class="comments-section">
            <h3 class="comments-title">💬 评论与反馈</h3>
            <p class="comments-subtitle">留下您的想法，我们会在审核后展示</p>
            
            <div class="comment-form">
                <input type="text" id="name" placeholder="您的姓名" required>
                <input type="email" id="email" placeholder="您的邮箱（仅用于审核）" required>
                <textarea id="comment" placeholder="请输入您的评论..." rows="4" required></textarea>
                <button onclick="submitComment()">提交评论</button>
            </div>
            
            <div class="comments-list">
                <h4 class="comments-list-title">💡 精选评论</h4>
                <div id="approvedComments"></div>
            </div>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                particle.style.width = (Math.random() * 3 + 2) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        // 评论功能
        function submitComment() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const comment = document.getElementById('comment').value;
            
            if (!name || !email || !comment) {
                alert('请填写所有必填字段');
                return;
            }
            
            const newComment = {
                id: Date.now(),
                name: name,
                email: email,
                comment: comment,
                date: new Date().toISOString(),
                approved: false
            };
            
            // 存储到localStorage
            let comments = JSON.parse(localStorage.getItem('comments') || '[]');
            comments.push(newComment);
            localStorage.setItem('comments', JSON.stringify(comments));
            
            alert('评论已提交，等待审核后展示');
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('comment').value = '';
            
            // 显示已审核的评论
            displayApprovedComments();
        }
        
        function displayApprovedComments() {
            const commentsList = document.getElementById('approvedComments');
            const comments = JSON.parse(localStorage.getItem('comments') || '[]');
            const approvedComments = comments.filter(comment => comment.approved);
            
            if (approvedComments.length === 0) {
                commentsList.innerHTML = '<p class="no-comments">暂无评论，快来成为第一个评论者吧！</p>';
                return;
            }
            
            let html = '';
            approvedComments.forEach(comment => {
                const date = new Date(comment.date).toLocaleString('zh-CN');
                html += `
                    <div class="comment-item">
                        <div class="comment-header">
                            <span class="comment-name">${comment.name}</span>
                            <span class="comment-date">${date}</span>
                        </div>
                        <div class="comment-content">${comment.comment}</div>
                    </div>
                `;
            });
            
            commentsList.innerHTML = html;
        }
        
        // 页面加载时显示已审核的评论
        window.onload = function() {
            createParticles();
            displayApprovedComments();
        };
    </script>
</body>
