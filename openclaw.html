<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Openclaw 探索 - MindPalace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            max-width: 1200px;
            width: 100%;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 2rem;
            background: linear-gradient(45deg, #e94560, #7b68ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            letter-spacing: 0.1em;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 3rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
            letter-spacing: 0.05em;
        }

        .table-container {
            max-width: 900px;
            margin: 0 auto 3rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.6s forwards;
        }

        .openclaw-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(40, 40, 45, 0.85);
            border: 1px solid rgba(80, 80, 90, 0.4);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .openclaw-table th,
        .openclaw-table td {
            padding: 1.5rem;
            text-align: left;
            border-bottom: 1px solid rgba(60, 60, 70, 0.4);
        }

        .openclaw-table th {
            background: rgba(50, 50, 55, 0.9);
            color: #e0e0e0;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
        }

        .openclaw-table tr {
            transition: all 0.3s ease;
        }

        .openclaw-table tr:hover {
            background: rgba(55, 55, 60, 0.7);
            transform: translateY(-1px);
        }

        .openclaw-table tr:nth-child(even) {
            background: rgba(45, 45, 50, 0.6);
        }

        .openclaw-table td {
            color: #e0e0e0;
            font-size: 1rem;
            line-height: 1.5;
        }

        .openclaw-table tr:first-child td {
            color: #e0e0e0;
        }

        .openclaw-table tr:nth-child(2) td {
            color: #e0e0e0;
        }

        .openclaw-link {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .openclaw-link:hover {
            text-decoration: underline;
            transform: translateY(-1px);
            color: #ffffff;
        }

        .openclaw-link::after {
            content: '🔗';
            margin-left: 8px;
            font-size: 12px;
            opacity: 0.6;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 3rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .nav-link {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .nav-link.active {
            background: rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.4);
            color: #e94560;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                padding: 1rem 0.5rem;
            }

            .container {
                padding: 1rem 0.5rem;
                width: 100%;
                max-width: 100%;
            }

            .title {
                font-size: 2.2rem;
                letter-spacing: 0.1em;
                margin-bottom: 1.5rem;
                word-break: break-word;
                padding: 0 0.5rem;
            }

            .subtitle {
                font-size: 1rem;
                letter-spacing: 0.1em;
                margin-bottom: 1.5rem;
                padding: 0 0.5rem;
            }

            .table-container {
                padding: 0 0.5rem;
            }

            .openclaw-table th,
            .openclaw-table td {
                padding: 0.8rem;
                font-size: 0.9rem;
            }

            .nav-links {
                flex-direction: column;
                gap: 0.5rem;
                margin-top: 2rem;
            }

            .nav-link {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1 class="title">Openclaw 探索</h1>
        <p class="subtitle">AI 智能体 Gateway 网关探索</p>
        
        <div class="table-container">
            <table class="openclaw-table">
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>介绍</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><a href="https://docs.openclaw.ai/zh-CN" target="_blank" class="openclaw-link">Openclaw中文官方社区</a></td>
                        <td>OpenClaw 开源 AI 智能体项目的官方中文文档站，面向开发者与个人用户，提供完整的安装、配置、使用与开发指南。</td>
                    </tr>
                    <tr>
                        <td><a href="https://activity.huaweicloud.com/openclaw.html" target="_blank" class="openclaw-link">华为云官方openclaw</a></td>
                        <td>9.9元轻松"养虾"，限时赠千万Tokens</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>

            <a href="companies.html" class="nav-link">公司</a>
            <a href="agentdev.html" class="nav-link">开发</a>
            <a href="projects.html" class="nav-link">项目</a>
            <a href="ranking.html" class="nav-link">排名</a>
            <a href="community.html" class="nav-link">社区</a>
            <a href="dify-workflow.html" class="nav-link">本体构建 - Step 1 语义测试</a>
            <a href="ontology-ai.html" class="nav-link">本体+AI</a>
            <a href="fishtest.html" class="nav-link">FishTest</a>
            <a href="papers.html" class="nav-link">经典论文</a>
            <a href="openclaw.html" class="nav-link active">Openclaw 探索</a>
            <a href="ocean-ranch.html" class="nav-link">AI+海洋牧场</a>
            <a href="ocean-ranch-flow.html" class="nav-link">流程图</a>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                particle.style.width = (Math.random() * 3 + 2) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        createParticles();
    </script>
</body>
</html>
