<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Skills - MindPalace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .title {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-bottom: 3rem;
            background: linear-gradient(90deg, #00d4ff, #ff6b9d, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        .section {
            margin-bottom: 4rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.6s forwards;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #00d4ff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .resource-card {
            background: rgba(40, 40, 45, 0.85);
            border: 1px solid rgba(80, 80, 90, 0.4);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            text-align: left;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .resource-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        .resource-card h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #feca57;
        }

        .resource-card .link-label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 0.5rem;
        }

        .resource-card a {
            color: #00d4ff;
            text-decoration: none;
            word-break: break-all;
            transition: color 0.3s ease;
        }

        .resource-card a:hover {
            color: #ff6b9d;
            text-decoration: underline;
        }

        .resource-card .date {
            font-size: 0.9rem;
            color: #888;
            margin-top: 1rem;
        }

        .resource-card .description {
            margin-top: 1rem;
            color: #ccc;
            line-height: 1.6;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.8rem 2rem;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.4);
            border-radius: 8px;
            color: #00d4ff;
            text-decoration: none;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.9s forwards;
        }

        .back-link:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 1rem 0.5rem;
            }

            .title {
                font-size: 2rem;
                letter-spacing: 0.1em;
                margin-bottom: 2rem;
            }

            .section-title {
                font-size: 1.4rem;
            }

            .resource-card {
                padding: 1.5rem;
            }

            .resource-card h3 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Agent Skills</h1>

        <div class="section">
            <h2 class="section-title">🔗 核心官方资源</h2>

            <div class="resource-card">
                <h3>1️⃣ 官方博客文章（首次提出概念）</h3>
                <div class="link-label">标题：</div>
                <p>Equipping agents for the real world with Agent Skills</p>
                <div class="link-label" style="margin-top: 1rem;">链接：</div>
                <a href="https://www.anthropic.com/engineering/equipping-agents-for-the-real-world-with-agent-skills" target="_blank">👉 https://www.anthropic.com/engineering/equipping-agents-for-the-real-world-with-agent-skills</a>
                <p class="date">发布时间：2025年10月16日</p>
                <p class="description">内容：Anthropic 工程团队首次系统阐述 Skills 的设计理念、技术架构与开发指南</p>
            </div>
        </div>

        <a href="index.html" class="back-link">← 返回首页</a>
    </div>
</body>
</html>
