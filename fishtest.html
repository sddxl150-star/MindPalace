<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPalace - FishTest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-bottom: 3rem;
            background: linear-gradient(90deg, #00d4ff, #ff6b9d, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        .workflow-section {
            margin-bottom: 4rem;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s ease-out forwards;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: #feca57;
        }

        .workflow-description {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
            max-width: 800px;
            margin: 0 auto;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .nav-link:hover {
            background: rgba(100, 149, 237, 0.2);
            border-color: rgba(100, 149, 237, 0.5);
            color: #ffffff;
        }

        .nav-link.active {
            background: rgba(100, 149, 237, 0.3);
            border-color: rgba(100, 149, 237, 0.6);
            color: #ffffff;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(100, 149, 237, 0.6);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0.6;
            }
            25% {
                transform: translateY(-100px) translateX(50px);
                opacity: 1;
            }
            50% {
                transform: translateY(-200px) translateX(-30px);
                opacity: 0.8;
            }
            75% {
                transform: translateY(-100px) translateX(-50px);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .title {
                font-size: 1.8rem;
                letter-spacing: 0.1em;
                margin-bottom: 2rem;
            }

            .section-title {
                font-size: 1.2rem;
            }

            .workflow-description {
                font-size: 0.9rem;
            }

            .nav-links {
                gap: 10px;
            }

            .nav-link {
                padding: 8px 15px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1 class="title">FishTest</h1>
        
        <div class="workflow-section">
            <h2 class="section-title">目标</h2>
            <p class="workflow-description">全流程跑通 demo，初步理解本体+AI 搭建的流程</p>
        </div>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>
            <a href="quote.html" class="nav-link">引言</a>
            <a href="companies.html" class="nav-link">公司</a>
            <a href="agentdev.html" class="nav-link">开发</a>
            <a href="projects.html" class="nav-link">项目</a>
            <a href="ranking.html" class="nav-link">排名</a>
            <a href="community.html" class="nav-link">社区</a>
            <a href="dify-workflow.html" class="nav-link">本体构建 - Step 1 语义测试</a>
            <a href="ontology-ai.html" class="nav-link">本体+AI</a>
            <a href="fishtest.html" class="nav-link active">FishTest</a>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        createParticles();
    </script>
</body>
</html>
