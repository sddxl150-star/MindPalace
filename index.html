<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPalace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .title {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite alternate;
        }

        .date {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #a0a0a0;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #e94560;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
            margin-bottom: 3rem;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 2s forwards;
        }

        .nav-link {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .nav-link.active {
            background: rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.4);
            color: #e94560;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 20px rgba(233, 69, 96, 0.3));
            }
            to {
                filter: drop-shadow(0 0 40px rgba(233, 69, 96, 0.6));
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                padding: 1rem 0.5rem;
            }

            .container {
                padding: 1rem 0.5rem;
                width: 100%;
                max-width: 100%;
            }

            .title {
                font-size: 2.2rem;
                letter-spacing: 0.1em;
                margin-bottom: 1.5rem;
                word-break: break-word;
                padding: 0 0.5rem;
            }

            .date {
                font-size: 1.1rem;
                letter-spacing: 0.05em;
                margin-bottom: 1rem;
                padding: 0 0.5rem;
            }

            .subtitle {
                font-size: 1rem;
                letter-spacing: 0.1em;
                margin-bottom: 2rem;
                padding: 0 0.5rem;
            }

            .nav-links {
                flex-direction: column;
                gap: 0.5rem;
                margin-top: 1.5rem;
            }

            .nav-link {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1 class="title">MindPalace</h1>
        <p class="date" id="currentDate"></p>
        <p class="subtitle">AI知识学习笔记</p>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link active">首页</a>
            <a href="quote.html" class="nav-link">引言</a>
            <a href="companies.html" class="nav-link">公司</a>
            <a href="agentdev.html" class="nav-link">开发</a>
            <a href="projects.html" class="nav-link">项目</a>
            <a href="ranking.html" class="nav-link">排名</a>
            <a href="community.html" class="nav-link">社区</a>
            <a href="dify-workflow.html" class="nav-link">本体构建 - Step 1 语义测试</a>
            <a href="ontology-ai.html" class="nav-link">本体+AI</a>
        </div>
    </div>

    <script>
        function updateDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekDay = weekDays[now.getDay()];
            
            document.getElementById('currentDate').textContent = `${year}年${month}月${day}日 ${weekDay}`;
        }

        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        updateDate();
        createParticles();
    </script>
</body>
</html>
