<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPalace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow-x: hidden;
            overflow-y: auto;
            padding: 2rem;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .title {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite alternate;
        }

        .date {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #a0a0a0;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #e94560;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
            margin-bottom: 1rem;
        }

        .source {
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #888;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .quote-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 3rem 4rem;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.8s forwards;
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .quote-english {
            font-size: 1.4rem;
            font-weight: 400;
            line-height: 1.8;
            color: #e8e8e8;
            font-style: italic;
            letter-spacing: 0.02em;
        }

        .quote-english::before {
            content: '"';
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.15);
            position: absolute;
            margin-left: -1.5rem;
            margin-top: -0.5rem;
            font-family: Georgia, serif;
        }

        .quote-chinese {
            font-size: 1.3rem;
            font-weight: 300;
            line-height: 1.8;
            color: #a0a0a0;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 2.1s forwards;
            letter-spacing: 0.1em;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 2.4s forwards;
        }

        .nav-link {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .nav-link.active {
            background: rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.4);
            color: #e94560;
        }

        /* 评论区域样式 */
        .comments-section {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .comments-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #e0e0e0;
        }

        .comments-subtitle {
            font-size: 1rem;
            color: #a0a0a0;
            margin-bottom: 2rem;
        }

        .comment-form {
            background: rgba(40, 40, 45, 0.85);
            border: 1px solid rgba(80, 80, 90, 0.4);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .comment-form input,
        .comment-form textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            background: rgba(50, 50, 55, 0.5);
            border: 1px solid rgba(80, 80, 90, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .comment-form input:focus,
        .comment-form textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
        }

        .comment-form textarea {
            resize: vertical;
            min-height: 120px;
        }

        .comment-form button {
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #00d4ff, #7b68ee);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .comment-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
        }

        .comments-list {
            background: rgba(40, 40, 45, 0.85);
            border: 1px solid rgba(80, 80, 90, 0.4);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .comments-list-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #e0e0e0;
        }

        .comment-item {
            padding: 1.5rem;
            background: rgba(50, 50, 55, 0.5);
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #00d4ff;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .comment-name {
            font-weight: 600;
            color: #e0e0e0;
        }

        .comment-date {
            font-size: 0.85rem;
            color: #a0a0a0;
        }

        .comment-content {
            color: #b0b0b0;
            line-height: 1.6;
        }

        .no-comments {
            color: #a0a0a0;
            text-align: center;
            padding: 2rem;
            font-style: italic;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 20px rgba(233, 69, 96, 0.3));
            }
            to {
                filter: drop-shadow(0 0 40px rgba(233, 69, 96, 0.6));
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                padding: 1rem 0.5rem;
            }

            .container {
                padding: 1rem 0.5rem;
                width: 100%;
                max-width: 100%;
            }

            .title {
                font-size: 2.2rem;
                letter-spacing: 0.1em;
                margin-bottom: 1.5rem;
                word-break: break-word;
                padding: 0 0.5rem;
            }

            .date {
                font-size: 0.9rem;
                letter-spacing: 0.05em;
                margin-bottom: 1rem;
                padding: 0 0.5rem;
            }

            .subtitle {
                font-size: 1rem;
                letter-spacing: 0.1em;
                margin-bottom: 1rem;
                padding: 0 0.5rem;
            }

            .nav-links {
                flex-direction: column;
                gap: 0.5rem;
                margin-top: 1.5rem;
            }

            .nav-link {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }

            .quote-card {
                padding: 2rem 1.5rem;
            }
            
            .quote-english {
                font-size: 1.1rem;
            }
            
            .quote-chinese {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1 class="title">MindPalace</h1>
        <p class="subtitle">AI知识学习笔记</p>
        <p class="date" id="currentDate"></p>
        
        <p class="source">Simonides of Ceos，5th c. BC</p>
        
        <div class="quote-card">
            <p class="quote-english">Turn your mind into a palace. Nothing just disappears.</p>
        </div>
        
        <p class="quote-chinese">（化心为殿，万念不湮）</p>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link active">首页</a>

            <a href="companies.html" class="nav-link">公司</a>
            <a href="agentdev.html" class="nav-link">开发</a>
            <a href="projects.html" class="nav-link">项目</a>
            <a href="ranking.html" class="nav-link">排名</a>
            <a href="community.html" class="nav-link">社区</a>
            <a href="dify-workflow.html" class="nav-link">本体构建 - Step 1 语义测试</a>
            <a href="ontology-ai.html" class="nav-link">本体+AI</a>
            <a href="fishtest.html" class="nav-link">FishTest</a>
            <a href="papers.html" class="nav-link">经典论文</a>

            <a href="ocean-ranch.html" class="nav-link">AI+海洋牧场</a>

        </div>

        <!-- 评论区域 -->
        <div class="comments-section">
            <h3 class="comments-title">💬 评论与反馈</h3>
            <p class="comments-subtitle">留下您的想法，我们会在审核后展示</p>
            
            <div class="comment-form">
                <input type="text" id="name" placeholder="您的姓名" required>
                <input type="email" id="email" placeholder="您的邮箱（仅用于审核）" required>
                <textarea id="comment" placeholder="请输入您的评论..." rows="4" required></textarea>
                <button onclick="submitComment()">提交评论</button>
            </div>
            
            <div class="comments-list">
                <h4 class="comments-list-title">💡 精选评论</h4>
                <div id="approvedComments"></div>
            </div>
        </div>
    </div>

    <script>
        function updateDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekDay = weekDays[now.getDay()];
            
            document.getElementById('currentDate').textContent = `${year}年${month}月${day}日 ${weekDay}`;
        }

        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        // 评论功能
        function submitComment() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const comment = document.getElementById('comment').value;
            
            if (!name || !email || !comment) {
                alert('请填写所有必填字段');
                return;
            }
            
            const newComment = {
                id: Date.now(),
                name: name,
                email: email,
                comment: comment,
                date: new Date().toISOString(),
                approved: false
            };
            
            // 存储到localStorage
            let comments = JSON.parse(localStorage.getItem('comments') || '[]');
            comments.push(newComment);
            localStorage.setItem('comments', JSON.stringify(comments));
            
            alert('评论已提交，等待审核后展示');
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('comment').value = '';
            
            // 显示已审核的评论
            displayApprovedComments();
        }
        
        function displayApprovedComments() {
            const commentsList = document.getElementById('approvedComments');
            const comments = JSON.parse(localStorage.getItem('comments') || '[]');
            const approvedComments = comments.filter(comment => comment.approved);
            
            if (approvedComments.length === 0) {
                commentsList.innerHTML = '<p class="no-comments">暂无评论，快来成为第一个评论者吧！</p>';
                return;
            }
            
            let html = '';
            approvedComments.forEach(comment => {
                const date = new Date(comment.date).toLocaleString('zh-CN');
                html += `
                    <div class="comment-item">
                        <div class="comment-header">
                            <span class="comment-name">${comment.name}</span>
                            <span class="comment-date">${date}</span>
                        </div>
                        <div class="comment-content">${comment.comment}</div>
                    </div>
                `;
            });
            
            commentsList.innerHTML = html;
        }
        
        // 页面加载时显示已审核的评论
        window.onload = function() {
            updateDate();
            createParticles();
            displayApprovedComments();
        };
    </script>
</body>
</html>
