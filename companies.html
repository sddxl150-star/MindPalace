<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPalace - 大模型公司</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow: hidden;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .title {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            margin-bottom: 3rem;
            background: linear-gradient(90deg, #00d4ff, #ff6b9d, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        .companies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .company-card {
            padding: 1.2rem 1.5rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s ease-out forwards;
            position: relative;
            overflow: hidden;
        }

        .company-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .company-card:hover::before {
            left: 100%;
        }

        .company-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* Google - 蓝绿渐变 */
        .company-card:nth-child(1) {
            background: linear-gradient(135deg, #4285f4, #34a853);
            animation-delay: 0.5s;
        }

        /* OpenAI - 青蓝渐变 */
        .company-card:nth-child(2) {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            animation-delay: 0.6s;
        }

        /* Claude - 棕橙渐变 */
        .company-card:nth-child(3) {
            background: linear-gradient(135deg, #d4a574, #c9956c);
            animation-delay: 0.7s;
        }

        /* Anthropic - 棕橙渐变 */
        .company-card:nth-child(3) {
            background: linear-gradient(135deg, #d4a574, #c9956c);
            animation-delay: 0.7s;
        }

        /* Deepseek - 深紫渐变 */
        .company-card:nth-child(4) {
            background: linear-gradient(135deg, #667eea, #764ba2);
            animation-delay: 0.8s;
        }

        /* Minimax - 橙红渐变 */
        .company-card:nth-child(5) {
            background: linear-gradient(135deg, #feca57, #ff6b6b);
            animation-delay: 0.9s;
        }

        /* Meta - 蓝紫渐变 */
        .company-card:nth-child(6) {
            background: linear-gradient(135deg, #0081ff, #6c5ce7);
            animation-delay: 1.0s;
        }

        /* MoonshotAI - 黄橙渐变 */
        .company-card:nth-child(7) {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            animation-delay: 1.1s;
        }

        /* ByteDance - 青绿渐变 */
        .company-card:nth-child(8) {
            background: linear-gradient(135deg, #00d2d3, #5f27cd);
            animation-delay: 1.2s;
        }

        /* Alibaba - 橙红渐变 */
        .company-card:nth-child(9) {
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            animation-delay: 1.3s;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            opacity: 0;
            animation: fadeIn 1s ease-out 2s forwards;
        }

        .nav-link {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .nav-link.active {
            background: rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.4);
            color: #e94560;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: float 15s infinite;
        }

        .particle:nth-child(3n) {
            background: rgba(0, 212, 255, 0.6);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .particle:nth-child(3n+1) {
            background: rgba(255, 107, 157, 0.6);
            box-shadow: 0 0 10px rgba(255, 107, 157, 0.5);
        }

        .particle:nth-child(3n+2) {
            background: rgba(254, 202, 87, 0.6);
            box-shadow: 0 0 10px rgba(254, 202, 87, 0.5);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                padding: 1rem 0.5rem;
                min-height: 100vh;
                height: auto;
            }

            .container {
                padding: 1rem 0.5rem;
                width: 100%;
                max-width: 100%;
            }

            .title {
                font-size: 2.2rem;
                letter-spacing: 0.1em;
                margin-bottom: 2rem;
                word-break: break-word;
                padding: 0 0.5rem;
            }

            .companies-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
                margin-bottom: 2rem;
                max-width: 100%;
            }

            .company-card {
                padding: 1rem 1.2rem;
                font-size: 1rem;
                border-radius: 10px;
            }

            .nav-links {
                flex-direction: column;
                gap: 0.5rem;
                margin-top: 2rem;
            }

            .nav-link {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.width = (Math.random() * 4 + 2) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        createParticles();
    </script>
