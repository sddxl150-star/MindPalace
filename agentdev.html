<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindPalace - Agent Development</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #fff;
            overflow: hidden;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .title {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: #888;
            margin-bottom: 4rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.3s forwards;
        }

        .qa-list {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            margin-bottom: 4rem;
        }

        .qa-item {
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
            text-align: left;
            opacity: 0;
            transform: translateX(-30px);
            animation: slideIn 0.8s ease-out forwards;
        }

        .qa-item:nth-child(1) { animation-delay: 0.5s; }
        .qa-item:nth-child(2) { animation-delay: 0.7s; }
        .qa-item:nth-child(3) { animation-delay: 0.9s; }

        .qa-number {
            font-size: 1.2rem;
            font-weight: 600;
            color: #00d4ff;
            min-width: 40px;
            letter-spacing: 0.05em;
        }

        .qa-content {
            flex: 1;
        }

        .qa-question {
            font-size: 1.4rem;
            font-weight: 500;
            color: #fff;
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }

        .qa-answer {
            font-size: 1rem;
            color: #feca57;
            letter-spacing: 0.05em;
        }

        .code-number {
            color: #00d4ff;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8), 0 0 20px rgba(0, 212, 255, 0.5);
            animation: glow 2s ease-in-out infinite alternate;
            margin: 0 0.3em;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px rgba(0, 212, 255, 0.8), 0 0 20px rgba(0, 212, 255, 0.5);
            }
            to {
                text-shadow: 0 0 20px rgba(0, 212, 255, 1), 0 0 30px rgba(0, 212, 255, 0.8), 0 0 40px rgba(0, 212, 255, 0.6);
            }
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .nav-link {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .nav-link.active {
            background: rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.4);
            color: #00d4ff;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            animation: float 20s infinite;
        }

        .particle:nth-child(3n) {
            background: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }

        .particle:nth-child(3n+1) {
            background: rgba(254, 202, 87, 0.5);
            box-shadow: 0 0 10px rgba(254, 202, 87, 0.4);
        }

        .particle:nth-child(3n+2) {
            background: rgba(255, 107, 157, 0.5);
            box-shadow: 0 0 10px rgba(255, 107, 157, 0.4);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                padding: 2rem 1rem;
                min-height: 100vh;
                height: auto;
            }

            .container {
                padding: 1rem 0.5rem;
                width: 100%;
                max-width: 100%;
            }

            .title {
                font-size: 2rem;
                letter-spacing: 0.2em;
                margin-bottom: 3rem;
            }

            .qa-list {
                gap: 2rem;
                margin-bottom: 3rem;
            }

            .qa-item {
                gap: 1rem;
            }

            .qa-number {
                font-size: 1rem;
                min-width: 35px;
            }

            .qa-question {
                font-size: 1.1rem;
                line-height: 1.5;
            }

            .qa-answer {
                font-size: 0.9rem;
            }

            .nav-links {
                flex-direction: column;
                gap: 0.5rem;
            }

            .nav-link {
                padding: 0.6rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <p class="title">Agent Development</p>
        
        <div class="qa-list">
            <div class="qa-item">
                <div class="qa-content">
                    <p class="qa-question"><span class="code-number">01</span> Dify：低代码，稳定，易运维，界面不友好</p>
                </div>
            </div>
            
            <div class="qa-item">
                <div class="qa-content">
                    <p class="qa-question"><span class="code-number">02</span> Vibe Coding：界面用户友好，运维成本高</p>
                </div>
            </div>
            
            <div class="qa-item">
                <div class="qa-content">
                    <p class="qa-question"><span class="code-number">03</span> 本体：破解业务语义</p>
                </div>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">首页</a>
            <a href="quote.html" class="nav-link">引言</a>
            <a href="companies.html" class="nav-link">公司</a>
            <a href="agentdev.html" class="nav-link active">开发</a>
            <a href="projects.html" class="nav-link">项目</a>
            <a href="ranking.html" class="nav-link">排名</a>
            <a href="community.html" class="nav-link">社区</a>
            <a href="dify-workflow.html" class="nav-link">Dify 工作流</a>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (Math.random() * 15 + 15) + 's';
                particle.style.width = (Math.random() * 3 + 2) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        createParticles();
    </script>
</body>
</html>
