<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论管理 - MindPalace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #e0e0e0;
            overflow-y: auto;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            background: rgba(40, 40, 45, 0.85);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #e0e0e0;
            text-align: center;
        }

        .comment-item {
            padding: 2rem;
            background: rgba(50, 50, 55, 0.5);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border-left: 4px solid #00d4ff;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .comment-meta {
            flex: 1;
        }

        .comment-name {
            font-weight: 600;
            color: #e0e0e0;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }

        .comment-email {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-bottom: 0.5rem;
        }

        .comment-date {
            font-size: 0.85rem;
            color: #a0a0a0;
        }

        .comment-content {
            color: #b0b0b0;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }

        .comment-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-approve {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: #fff;
        }

        .btn-approve:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
        }

        .btn-delete {
            background: linear-gradient(135deg, #f44336, #da190b);
            color: #fff;
        }

        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.4);
        }

        .no-comments {
            color: #a0a0a0;
            text-align: center;
            padding: 4rem;
            font-style: italic;
            font-size: 1.1rem;
        }

        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.4);
        }

        .status-approved {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.4);
        }

        .filter-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(50, 50, 55, 0.5);
            border-radius: 8px;
        }

        .filter-select {
            padding: 0.6rem 1rem;
            background: rgba(60, 60, 65, 0.8);
            border: 1px solid rgba(80, 80, 90, 0.3);
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.9rem;
        }

        .filter-select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
        }

        .clear-all-btn {
            padding: 0.6rem 1.5rem;
            background: linear-gradient(135deg, #6c757d, #5a6268);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clear-all-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 117, 125, 0.4);
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 1rem;
            }

            .comment-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            .comment-actions {
                width: 100%;
                justify-content: space-between;
            }

            .btn {
                flex: 1;
                text-align: center;
            }

            .filter-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>评论管理</h1>
        
        <div class="filter-section">
            <select class="filter-select" id="filterStatus" onchange="filterComments()">
                <option value="all">所有评论</option>
                <option value="pending">待审核</option>
                <option value="approved">已审核</option>
            </select>
            <button class="clear-all-btn" onclick="clearAllComments()">清空所有评论</button>
        </div>
        
        <div id="commentsList"></div>
    </div>

    <script>
        function loadComments() {
            const comments = JSON.parse(localStorage.getItem('comments') || '[]');
            const commentsList = document.getElementById('commentsList');
            const filterStatus = document.getElementById('filterStatus').value;
            
            let filteredComments = comments;
            if (filterStatus !== 'all') {
                filteredComments = comments.filter(comment => 
                    (filterStatus === 'pending' && !comment.approved) ||
                    (filterStatus === 'approved' && comment.approved)
                );
            }
            
            if (filteredComments.length === 0) {
                commentsList.innerHTML = '<div class="no-comments">暂无评论</div>';
                return;
            }
            
            let html = '';
            filteredComments.forEach(comment => {
                const date = new Date(comment.date).toLocaleString('zh-CN');
                html += `
                    <div class="comment-item">
                        <div class="comment-header">
                            <div class="comment-meta">
                                <div class="comment-name">${comment.name}</div>
                                <div class="comment-email">${comment.email}</div>
                                <div class="comment-date">${date}</div>
                            </div>
                            <span class="status-badge ${comment.approved ? 'status-approved' : 'status-pending'}">
                                ${comment.approved ? '已审核' : '待审核'}
                            </span>
                        </div>
                        <div class="comment-content">${comment.comment}</div>
                        <div class="comment-actions">
                            ${!comment.approved ? `<button class="btn btn-approve" onclick="approveComment(${comment.id})">审核通过</button>` : ''}
                            <button class="btn btn-delete" onclick="deleteComment(${comment.id})">删除评论</button>
                        </div>
                    </div>
                `;
            });
            
            commentsList.innerHTML = html;
        }
        
        function approveComment(commentId) {
            let comments = JSON.parse(localStorage.getItem('comments') || '[]');
            comments = comments.map(comment => {
                if (comment.id === commentId) {
                    return { ...comment, approved: true };
                }
                return comment;
            });
            localStorage.setItem('comments', JSON.stringify(comments));
            loadComments();
        }
        
        function deleteComment(commentId) {
            if (confirm('确定要删除这条评论吗？')) {
                let comments = JSON.parse(localStorage.getItem('comments') || '[]');
                comments = comments.filter(comment => comment.id !== commentId);
                localStorage.setItem('comments', JSON.stringify(comments));
                loadComments();
            }
        }
        
        function filterComments() {
            loadComments();
        }
        
        function clearAllComments() {
            if (confirm('确定要清空所有评论吗？此操作不可恢复。')) {
                localStorage.removeItem('comments');
                loadComments();
            }
        }
        
        // 页面加载时显示评论
        window.onload = function() {
            loadComments();
        };
    </script>
</body>
</html>
